<div class="wrapper">
  <div class="list">
    <div class="item" *ngFor="let item of tasks" (click)="getTask(item)">
      <div class="col">
        <label>Name</label>
        <p>{{ item.name }}</p>
      </div>
      <div class="col">
        <label>Start date</label>
        <p>{{ item.startTime | date: "dd/MM/YYYY HH:mm" }}</p>
      </div>
      <div class="col">
        <label>Deadline</label>
        <p>{{ item.deadline | date: "dd/MM/YYYY HH:mm" }}</p>
      </div>
      <div class="col">
        <label>Assignee Name</label>
        <p>{{ item.assignee.firstName + " " + item.assignee.lastName }}</p>
      </div>
      <div class="col">
        <label>Status</label>
        <p>{{ item.status }}</p>
      </div>
      <div class="btn">
        <button>
          <i class="pi pi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
  <div class="btns">
    <button (click)="ref.close()">{{ "Cancel" }}</button>
  </div>
</div>
<div class="back warning" *ngIf="showWarning" (click)="showWarning = false">
  <div class="block">
    <div class="info">
      <i class="pi pi-exclamation-circle"></i>
      <div class="txt">
        <div class="name">
          <p>Task is not active!</p>
        </div>
      </div>
    </div>
    <button class="button" (click)="showWarning = false">
      Close
      <span class="icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="14"
          viewBox="0 0 15 14"
          fill="none"
        >
          <path
            d="M12.9842 0.751373C12.7546 0.623759 12.5021 0.542627 12.2412 0.512611C11.9802 0.482595 11.7159 0.504283 11.4633 0.576437C11.2107 0.648591 10.9748 0.769797 10.7691 0.933132C10.5633 1.09647 10.3918 1.29873 10.2642 1.52837L6.55125 8.21037L4.42625 6.08537C4.24175 5.89435 4.02106 5.74199 3.77706 5.63717C3.53305 5.53235 3.27061 5.47718 3.00505 5.47487C2.73949 5.47256 2.47613 5.52317 2.23034 5.62373C1.98455 5.72429 1.76124 5.8728 1.57346 6.06058C1.38567 6.24837 1.23717 6.47167 1.1366 6.71746C1.03604 6.96326 0.985439 7.22662 0.987746 7.49218C0.990054 7.75773 1.04523 8.02017 1.15004 8.26418C1.25486 8.50819 1.40723 8.72888 1.59825 8.91337L5.59825 12.9134C5.97625 13.2924 6.48625 13.5004 7.01225 13.5004L7.28925 13.4804C7.5958 13.4375 7.88821 13.324 8.14347 13.149C8.39872 12.9739 8.60986 12.7419 8.76025 12.4714L13.7602 3.47137C13.8879 3.24182 13.9691 2.98938 13.9992 2.72845C14.0293 2.46753 14.0077 2.20323 13.9356 1.95065C13.8635 1.69807 13.7424 1.46216 13.5792 1.25639C13.416 1.05062 13.2138 0.879011 12.9842 0.751373Z"

      </span>
    </button>
  </div>
</div>
