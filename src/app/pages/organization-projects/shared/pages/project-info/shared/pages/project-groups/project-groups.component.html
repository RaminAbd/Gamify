<div class="content">
  <div class="heading">
    <div class="search">
      <p>{{ groups.length + " " + "Groups" }}</p>
      <div class="search-block">
        <i class="pi pi-search"></i>
        <input
          type="text"
          [(ngModel)]="searchText"
          placeholder="{{ 'Search' }}..."
          (input)="searchByName()"
        />
      </div>
    </div>
    <div class="btn">
      <button class="allowed" (click)="openDialog()">
        {{ "Add new" }}
      </button>
    </div>
  </div>
  <div class="list">
    <div
      class="item"
      *ngFor="let item of filteredList"
      (click)="getGroupItem(item)"
    >
      <div class="col">
        <label>Name</label>
        <p>{{ item.name }}</p>
      </div>
      <div class="col">
        <label>{{ "Youth workers" }}</label>
        <div class="value">
          <svg
            width="17"
            height="14"
            viewBox="0 0 17 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >

          <p>{{ item.workerAmount }}</p>
        </div>
      </div>
      <div class="col">
        <label>{{ "Participants" }}</label>
        <div class="value">
          <svg
            width="12"
            height="15"
            viewBox="0 0 12 15"
            fill="none"

              fill="#13170C"
            />
          </svg>

          <p>{{ item.participantAmount }}</p>
        </div>
      </div>
      <div
        class="btn"
        (click)="$event.stopPropagation(); op.toggle($event); openToolbar(item)"
      >
        <button>
          <img src="dots.svg" alt="" />
        </button>
      </div>
    </div>
  </div>
</div>
<p-popover #op>
  <div class="flex flex-col gap-4 w-[25rem]">
    <div class="actions">
      <div class="item edit" (click)="editGroup(); op.toggle($event)">

          height="20"
          viewBox="0 0 20 20"

        <p>{{ "Edit" }}</p>
      </div>
      <div class="item delete" (click)="deleteGroup(); op.toggle($event)">
        <div class="icon"><img src="delete.svg" alt="" /></div>
        <p>{{ "Delete" }}</p>
      </div>
    </div>
  </div>
</p-popover>
