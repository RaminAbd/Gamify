<div class="wrapper">
  <app-upsert-heading
    [name]="'Projects'"
    [showSave]="false"
  ></app-upsert-heading>
  <div class="content">
    <div class="image">
      <img [src]="request.logo.fileUrl" alt="" />
    </div>
    <div class="rows">
      <div class="row1">
        <div class="input-item">
          <label>Full name</label>
          <p>{{ request.firstName + " " + request.lastName }}</p>
        </div>
        <div class="input-item">
          <label>Email</label>
          <p>{{ request.email }}</p>
        </div>
        <div class="input-item">
          <label>Organization name</label>
          <a [href]="request.website" target="_blank">{{ request.name }}</a>
        </div>
      </div>
      <div class="row1">
        <div class="input-item">
          <label>Organization ID</label>
          <p>{{ request.organizationId }}</p>
        </div>
        <div class="input-item">
          <label>Country</label>
          <p>{{ request.country }}</p>
        </div>
        <div class="input-item">
          <label>Social Media</label>
          <a [href]="request.socialMediaLink" target="_blank">Click to see</a>
        </div>
      </div>
    </div>
  </div>
</div>
