<div class="wrapper">
  <div class="inputs">
    <div class="input-item">
      <label for="name">{{ "Topic name"  }}</label>
      <input type="text" id="name" [(ngModel)]="name" />
    </div>
  </div>
  <div class="btns">
    <button (click)="ref.close()">{{ "Cancel"  }}</button>
    <button class="save" (click)="save()">{{ "Save"  }}</button>
  </div>
</div>
