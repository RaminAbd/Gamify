<header class="header mobile" id="mob">
  <div class="row1">
    <a routerLink="/" class="logo" aria-label="logo">
      <img src="logo.svg" alt="" />
    </a>

    <div class="burger-back">
      <div class="menu-burger burger" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <nav
    [@menuExpand]="showMenu ? 'open' : 'closed'"
    (@menuExpand.done)="onAnimationDone()"
    [ngClass]="{ hidden: isHidden }"
  >

    <ul class="nav-links" *ngFor="let section of sections">
      <li *ngFor="let link of section.links" (click)="closeBurger()">
        <a [routerLink]="link.url" [routerLinkActive]="['active']">
          <img [src]="'navigation-images/'+link.iconURL" alt="">
          <p>{{ link.name }}</p>
        </a>
      </li>
      <li class="contact">
        <a aria-label="logout" (click)="logout()">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="19"
            viewBox="0 0 18 19"
            fill="none"
          >
            <path
              d="M13.5 6.5L16.5 9.5M16.5 9.5L13.5 12.5M16.5 9.5H6.75M11.25 3.65303C10.2939 3.07871 9.18393 2.75 8 2.75C4.41015 2.75 1.5 5.77208 1.5 9.5C1.5 13.2279 4.41015 16.25 8 16.25C9.18393 16.25 10.2939 15.9213 11.25 15.347"
              stroke="#8577E6"
              strokeWidth="2"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
          </svg>
          <p>Logout</p></a
        >
      </li>
    </ul>
  </nav>
</header>
