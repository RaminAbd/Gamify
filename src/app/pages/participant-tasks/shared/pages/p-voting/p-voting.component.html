<div class="wrapper">
  <div class="wallpaper">
    <div class="back">
      <img
        src="https://blobstudentportal.blob.core.windows.net/test/a944c8dd-2f19-4a8f-8560-290b133698fc456a17baac72aae945cdf1def6773e51%20%282%29.webp"
        alt=""
      />
    </div>
    <div class="type-name">
      <div class="type">
        <img
          src="https://blobstudentportal.blob.core.windows.net/test/88e04d0e-5d3f-4072-b253-e953304b78a03363af83fb1e0ac3bb15a6cadaef83ee%20%281%29.webp"
          alt=""
        />
      </div>
      <div class="name">
        <p>{{ response.name }}</p>
      </div>
    </div>
    <div class="desc">
      <p>{{ response.description }}</p>
    </div>
  </div>

  <div class="list">
    <div class="item" *ngFor="let item of response.candidates">
      <div class="col">
        <label>{{ "Candidate name" }}</label>
        <p>{{ item.firstName + " " + item.lastName }}</p>
      </div>
      <button [disabled]="response.votedTo" (click)="vote(item.id)">
        <svg
          *ngIf="response.votedTo !== item.id"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M18 13L21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16L6 13H6.83L8.83 15H6.78L5 17H19L17.23 15H15.32L17.32 13H18ZM19 20V19H5V20H19ZM11.34 15L6.39 10.07C6.2973 9.97749 6.22375 9.8676 6.17357 9.74662C6.12339 9.62565 6.09756 9.49597 6.09756 9.365C6.09756 9.23403 6.12339 9.10435 6.17357 8.98338C6.22375 8.8624 6.2973 8.75251 6.39 8.66L12.76 2.29C12.8516 2.1969 12.9609 2.12314 13.0815 2.0731C13.2021 2.02306 13.3315 1.99775 13.4621 1.99868C13.5927 1.99961 13.7218 2.02677 13.8416 2.07853C13.9615 2.13029 14.0698 2.2056 14.16 2.3L19.11 7.25C19.5 7.64 19.5 8.27 19.11 8.66L12.75 15C12.6601 15.0973 12.5511 15.1749 12.4298 15.2279C12.3084 15.281 12.1774 15.3084 12.045 15.3084C11.9126 15.3084 11.7816 15.281 11.6602 15.2279C11.5389 15.1749 11.4299 15.0973 11.34 15ZM13.46 4.41L8.5 9.36L12.05 12.9L17 7.95L13.46 4.41Z"
            fill="white"
          />
        </svg>
        <svg
          *ngIf="response.votedTo === item.id"
          width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 13L21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16L6 13H6.83L8.83 15H6.78L5 17H19L17.23 15H15.32L17.32 13H18ZM19 20V19H5V20H19Z" fill="white"/>

        </svg>


      </button>
    </div>
  </div>
  <div class="btns">
    <!--    <button (click)="finishTask()">Finish</button>-->
  </div>
</div>
