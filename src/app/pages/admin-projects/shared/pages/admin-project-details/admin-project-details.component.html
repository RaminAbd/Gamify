<div class="wrapper">
  <app-upsert-heading
    [name]="'Projects'"
    [showSave]="false"
  ></app-upsert-heading>
  <div class="content">
    <div class="image">
      <img *ngIf="request.image" [src]="request.image.fileUrl" alt="" />
      <img  *ngIf="!request.image"  src="https://blobstudentportal.blob.core.windows.net/test/cf5e62f9-a817-4aa6-b2f6-f6f987c8187bimage%2026.png" alt="">
    </div>
    <div class="rows">
      <div class="row1">
        <div class="input-item">
          <label>Name</label>
          <p>{{ request.name }}</p>
        </div>
        <div class="input-item">
          <label>Description</label>
          <p>{{ request.description }}</p>
        </div>
        <div class="input-item">
          <label>Organization</label>
          <p>{{ request.organization }}</p>
        </div>
      </div>
      <div class="row1">
        <div class="input-item">
          <label>Reward Rules</label>
          <p>{{ request.rewardRules }}</p>
        </div>
        <div class="input-item">
          <label>Start date</label>
          <p>{{ request.startDate }}</p>
        </div>
        <div class="input-item">
          <label>End date</label>
          <p>{{ request.endDate }}</p>
        </div>
      </div>
    </div>
  </div>
  <div class="heading" style="margin-top: 30px;">
    <h3>Leaderboard</h3>
  </div>
  <div class="tabs">
    <div class="item" *ngFor="let type of types" (click)="selectType(type)" [ngClass]="{'selected':type.selected}">
      <p>{{ type.name }}</p>
    </div>
  </div>
  <div class="tab-content" style="padding-bottom: 30px;">
    <div class="list">
      <div class="item" *ngFor="let item of leaderboard">
        <div class="col">
          <label>{{ "Nickname" }}</label>
          <p>{{ item.nickName }}</p>
        </div>
        <div class="col">
          <label>{{ "Points" }}</label>
          <p>{{ item.points }}</p>
        </div>

      </div>
    </div>
  </div>
</div>
